<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — Knowly</title>
  <th:block th:replace="~{fragments/styles :: styles('SignUp.css')}"></th:block>
</head>
<body>
  <nav class="su-nav">
    <a th:href="@{/}" class="su-logo"><span class="su-logo-know">Know</span><span class="su-logo-ly">ly</span></a>
    <p class="su-nav-label">Reset your password</p>
    <a th:href="@{/login}" class="su-nav-link">Back to <strong>Sign in</strong></a>
  </nav>

  <main class="su-layout" style="display:flex;align-items:center;justify-content:center;">
    <div class="ep-card" style="max-width:420px;width:100%;">
      <h2 class="ep-card-title">Forgot your password?</h2>
      <p class="ep-card-sub">Enter your email and we'll send you a 6-digit code.</p>

      <div class="ep-field ep-field-full">
        <label class="ep-label" for="email">Email</label>
        <input type="email" id="email" class="ep-input" placeholder="you@example.com" />
      </div>
      <p class="ep-field-error" id="emailError" role="alert"></p>
      <button id="sendCodeBtn" class="su-submit-btn" type="button">Send Code</button>

      <div id="resetSection" style="display:none;margin-top:20px;">
        <div class="ep-field ep-field-full">
          <label class="ep-label" for="code">6-digit Code</label>
          <input type="text" id="code" class="ep-input" maxlength="6" placeholder="123456" />
        </div>
        <div class="ep-field ep-field-full">
          <label class="ep-label" for="newPassword">New Password</label>
          <input type="password" id="newPassword" class="ep-input" minlength="6" placeholder="Create a new password" />
        </div>
        <p class="ep-field-error" id="resetError" role="alert"></p>
        <button id="resetBtn" class="su-submit-btn" type="button">Reset Password</button>
      </div>
    </div>
  </main>

  <script th:src="@{/js/ForgotPassword.js}"></script>
</body>
</html>
