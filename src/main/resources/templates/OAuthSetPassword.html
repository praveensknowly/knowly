<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set a Password — Knowly</title>
  <th:block th:replace="~{fragments/styles :: styles('EditProfile.css')}"></th:block>
  <th:block th:replace="~{fragments/styles :: styles('SignUp.css')}"></th:block>
</head>
<body>
  <main class="su-layout" style="display:flex;align-items:center;justify-content:center;min-height:100vh;">
    <div class="ep-card" style="max-width:420px;width:100%;">
      <div class="ep-card-title-row">
        <div>
          <h2 class="ep-card-title">Welcome to Knowly 🎉</h2>
          <p class="ep-card-sub">
            You signed up with <span th:text="${user.provider}">Google</span>.
            Set a password to also be able to log in with your email and password.
          </p>
        </div>
      </div>

      <p class="ep-field-error" th:if="${error}" th:text="${error}" style="display:block;"></p>

      <form th:action="@{/oauth2/set-password}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <div class="ep-field ep-field-full">
          <label class="ep-label" for="newPassword">Set Password</label>
          <input type="password" id="newPassword" name="newPassword" class="ep-input"
                 minlength="6" placeholder="Create a password (min. 6 characters)" />
        </div>

        <div class="ep-field ep-field-full">
          <label class="ep-label" for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" class="ep-input"
                 minlength="6" placeholder="Re-enter password" />
        </div>

        <div style="margin-top:20px;">
          <button type="submit" class="su-submit">Set Password</button>
        </div>
      </form>
    </div>
  </main>
</body>
</html>
